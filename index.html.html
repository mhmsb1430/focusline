<style>

  ::-webkit-scrollbar{width:0;display:none;}
  #loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:linear-gradient(145deg,#EEF2FF,#F0FDF4,#FFF7ED);z-index:9999;padding:20px;}
  .spinner{width:48px;height:48px;border:4px solid #10C98F30;border-top:4px solid #10C98F;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading p{font-weight:800;color:#10C98F;font-size:14px;font-family:'Tajawal',sans-serif;}
  #error-box{position:fixed;inset:0;background:#fff;padding:24px;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:99999;text-align:center;}
  #error-box.show{display:flex;}
  #error-box h2{color:#F43F5E;font-size:18px;font-weight:900;}
  #error-box pre{background:#FFF1F2;padding:12px;border-radius:8px;font-size:11px;text-align:left;direction:ltr;max-width:100%;overflow:auto;white-space:pre-wrap;word-break:break-word;color:#1E2A3B;line-height:1.6;border:1px solid #FECDD3;}
  #error-box button{padding:12px 24px;background:#10C98F;color:#fff;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;}
</style>

<body>
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">FocusLine — جاري التحميل...</p>
</div>

<div id="error-box">
  <h2>⚠️ حدث خطأ</h2>
  <p style="color:#6B7A99;font-size:13px;font-family:'Tajawal',sans-serif;">المنصة ما تقدر تشتغل. هذا التفصيل:</p>
  <pre id="error-detail">...</pre>
  <button onclick="location.reload()">🔄 إعادة المحاولة</button>
</div>

<div id="root"></div>

<script>
  // عرض أي خطأ يحدث
  window.addEventListener('error', function(e) {
    var box = document.getElementById('error-box');
    var detail = document.getElementById('error-detail');
    if (box && detail) {
      box.classList.add('show');
      detail.textContent = 'Error: ' + e.message + '\n\nFile: ' + (e.filename || 'inline') + '\nLine: ' + (e.lineno || '?') + '\n\nStack:\n' + (e.error && e.error.stack ? e.error.stack.slice(0, 500) : 'none');
    }
  });
  
  // كشف حالة التحميل
  var loadingText = document.getElementById('loading-text');
  var libsLoaded = { react: false, reactdom: false, babel: false };
  
  function checkLoaded() {
    if (libsLoaded.react && libsLoaded.reactdom && libsLoaded.babel) {
      if (loadingText) loadingText.textContent = 'FocusLine — تشغيل التطبيق...';
    }
  }
  
  // timeout للأمان - إذا ما اشتغل بعد 15 ثانية
  setTimeout(function() {
    if (document.getElementById('loading').style.display !== 'none') {
      var box = document.getElementById('error-box');
      var detail = document.getElementById('error-detail');
      if (box && detail && !box.classList.contains('show')) {
        box.classList.add('show');
        detail.textContent = 'انتهى وقت التحميل (15 ثانية).\n\nالأسباب المحتملة:\n1. ضعف الاتصال بالإنترنت\n2. المكتبات لم تُحمّل (React, Babel)\n3. الجوال يحظر JavaScript\n\nReact loaded: ' + libsLoaded.react + '\nReactDOM loaded: ' + libsLoaded.reactdom + '\nBabel loaded: ' + libsLoaded.babel;
      }
    }
  }, 15000);
</script>

//  GENERATE DAILY TASKS (يتجدد كل يوم تلقائياً)
// ══════════════════════════════════════════════════════════════════════════════
function generateDailyTasks(date = new Date()) {
  const dow = date.getDay();
  const startDate = new Date("2026-05-19");
  const dayIndex = Math.floor((date.getTime() - startDate.getTime()) / 86400000);
  const shamEp1 = 8 + dayIndex % 18 * 2;
  const shamEp2 = shamEp1 + 1;
  const isWorkout = WORKOUT_DAYS.includes(dow);
  const isSeerah = SEERAH_DAYS.includes(dow);
  const isReading = READING_DAYS.includes(dow);
  // علوي أو سفلي بالتناوب حسب عدد جلسات التمرين المرت
  const workoutSessionCount = dayIndex; // تقريبي
  const workoutType = workoutSessionCount % 2 === 0 ? "upper" : "lower";
  const tasks = [];
  let id = Date.now();

  // ── بعد الفجر ──
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "fajr",
    priority: "high",
    done: false,
    time: "05:45",
    title: "أذكار الصباح",
    link: ""
  });
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "fajr",
    priority: "high",
    done: false,
    time: "06:00",
    title: "مراجعة أهداف اليوم",
    link: ""
  });
  if (isWorkout) {
    const wl = workoutType === "upper" ? UPPER[0].link : LOWER[0].link;
    const wt = workoutType === "upper" ? "🔼 تمرين علوي (صدر + ظهر + أذرع)" : "🔽 تمرين سفلي (فخذ + ساق + بطن)";
    tasks.push({
      id: id++,
      type: "daily",
      prayer: "fajr",
      priority: "high",
      done: false,
      time: "06:30",
      title: wt,
      link: wl
    });
  }

  // ── بعد الظهر ──
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "dhuhr",
    priority: "high",
    done: false,
    time: "12:30",
    title: "دراسة الأصول الفكرية (١٠ صفحات)",
    link: FUSUL_LINK
  });
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "dhuhr",
    priority: "high",
    done: false,
    time: "13:30",
    title: "درس الإنجليزية اليومي",
    link: ENGLISH_LINK
  });
  if (isReading) {
    tasks.push({
      id: id++,
      type: "daily",
      prayer: "dhuhr",
      priority: "medium",
      done: false,
      time: "14:30",
      title: "📖 قراءة ملخص التربية (٤٠ دقيقة)",
      link: TARBIYA_LINK
    });
  }

  // ── بعد العصر ──
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "asr",
    priority: "high",
    done: false,
    time: "16:00",
    title: `✨ الشمائل المحمدية — مقطع ${shamEp1} + ${shamEp2}`,
    link: SHAMAEL_BASE
  });

  // ── بعد المغرب ──
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "maghrib",
    priority: "high",
    done: false,
    time: "19:00",
    title: "أذكار المساء",
    link: ""
  });
  if (isSeerah) {
    tasks.push({
      id: id++,
      type: "daily",
      prayer: "maghrib",
      priority: "high",
      done: false,
      time: "19:30",
      title: "🕌 سيرة النبي ﷺ — الشيخ بدر المشاري",
      link: SEERAH_LINK
    });
  }

  // ── بعد العشاء ──
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "isha",
    priority: "medium",
    done: false,
    time: "21:00",
    title: "مراجعة ما تعلمته اليوم",
    link: ""
  });
  tasks.push({
    id: id++,
    type: "daily",
    prayer: "isha",
    priority: "high",
    done: false,
    time: "22:30",
    title: "تخطيط مهام الغد",
    link: ""
  });
  return tasks;
}

  },

  social: {

  }
};
async function callAI(text) {
  const positive_words = ['ممتاز', 'رائع', 'سعيد', 'منتج', 'إيجابي', 'إنجاز', 'تمرين', 'أحسنت', 'فرح', 'حماس', 'الحمدلله', 'موفق'];
  const negative_words = ['حزين', 'تعب', 'ضغط', 'كسل', 'فشل', 'سيء', 'مشكلة', 'صعب', 'متوتر', 'قلق', 'محبط', 'ملل'];
  let pos_count = positive_words.filter(w => text.includes(w)).length;
  let neg_count = negative_words.filter(w => text.includes(w)).length;
  let mood, score, reasons = [];
  if (pos_count > neg_count) {
    mood = 'positive';
    score = Math.min(95, 60 + pos_count * 8);
    if (text.includes('تمرين') || text.includes('رياض')) reasons.push('exercise');
    if (text.includes('منتج') || text.includes('أنجز')) reasons.push('productivity');
    if (text.includes('نوم')) reasons.push('sleep');
    if (text.includes('صديق') || text.includes('أهل')) reasons.push('social');
  } else if (neg_count > pos_count) {
    mood = 'negative';
    score = Math.max(20, 50 - neg_count * 8);
    if (text.includes('ضغط') || text.includes('قلق')) reasons.push('stress');
    if (text.includes('هاتف')) reasons.push('phone');
  } else { mood = 'neutral'; score = 55; }
  if (reasons.length === 0) reasons.push(mood === 'positive' ? 'productivity' : mood === 'negative' ? 'stress' : 'sleep');
  const insights = {
    positive: ['استمر على هذا المنوال — يومك واعد!', 'الإيجابية تجلب البركة في الوقت والعمل.', 'احتفظ بهذا الزخم!'],
    neutral: ['يوم متوسط — جرّب نشاطاً جديداً غداً.', 'تأمّل ما الذي يمكن تحسينه.', 'النمو يحدث في الأيام العادية.'],
    negative: ['تذكّر أن الأيام الصعبة جزء من النمو.', 'استرح، اشرب ماءً، وارجع غداً بنشاط.', 'تقرّب من الله، وضع هاتفك جانباً.']
  };
  return {
    mood, score, reasons: reasons.slice(0, 3),
    insight: insights[mood][Math.floor(Math.random() * 3)],
    summary: mood === 'positive' ? 'يوم إيجابي' : mood === 'negative' ? 'يوم صعب' : 'يوم عادي'
  };
}

function Checkbox({
  done,
  onToggle,
  color
}) {
  return <button onClick={onToggle} style={{
    width: 26,
    height: 26,
    borderRadius: 7,
    border: `2.5px solid ${done ? color : "#CBD5E1"}`,
    background: done ? color : "transparent",
    cursor: "pointer",
    flexShrink: 0,
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    boxShadow: done ? `0 3px 10px ${color}50` : "none",
    transition: "all .2s"
  }}>
      {done && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>}
    </button>;
}
function Toggle({
  on,
  onToggle,
  color = "#10C98F"
}) {
  return <button onClick={onToggle} style={{
    width: 48,
    height: 26,
    borderRadius: 13,
    border: "none",
    background: on ? color : "#CBD5E1",
    cursor: "pointer",
    position: "relative",
    flexShrink: 0,
    transition: "background .2s"
  }}>
      <div style={{
      width: 20,
      height: 20,
      borderRadius: "50%",
      background: "#fff",
      position: "absolute",
      top: 3,
      left: on ? 25 : 3,
      transition: "left .2s",
      boxShadow: "0 2px 5px rgba(0,0,0,.2)"
    }} />
    </button>;
}

          color: C.textSub,
          marginBottom: 24
        }}>نظامك الشخصي للإنتاجية والانضباط</p>
          <div style={{
          display: "flex",
          flexWrap: "wrap",
          gap: 7,
          justifyContent: "center",
          marginBottom: 26
        }}>
            {[["✓ أوقات الصلوات", "#10C98F", "#ECFDF5"], ["✓ تحليل AI", "#4A8CFF", "#EFF6FF"], ["✓ شعر يومي", "#8B5CF6", "#F5F3FF"], ["✓ تجدد تلقائي", "#F59E0B", "#FFFBEB"]].map(([f, c, bg], i) => <span key={i} style={{
            padding: "4px 11px",
            borderRadius: 20,
            fontSize: 11,
            fontWeight: 700,
            background: bg,
            color: c
          }}>{f}</span>)}
          </div>
          <button onClick={handleLogin} disabled={signing} style={{
          width: "100%",
          padding: "14px 20px",
          borderRadius: 16,
          border: `1.5px solid ${C.border}`,
          background: C.bg,
          color: C.text,
          fontSize: 14,
          fontWeight: 700,
          cursor: signing ? "not-allowed" : "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 12,
          fontFamily: "inherit",
          boxShadow: "0 4px 16px rgba(0,0,0,.08)"
        }}>
            {signing ? <><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#10C98F" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="10" strokeOpacity=".2" /><path d="M12 2a10 10 0 0 1 10 10"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur=".8s" repeatCount="indefinite" /></path></svg>جاري تسجيل الدخول...</> : <><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" /><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" /><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05" /><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" /></svg>الدخول مرة واحدة مع Google</>}
          </button>
          <p style={{
          fontSize: 10,
          color: C.textDim,
          marginTop: 12
        }}>سيتم تذكّرك تلقائياً في كل مرة</p>
        </div>
      </div>;
  }

  // ── MAIN APP ──
  return <div style={{
    height: "100vh",
    display: "flex",
    flexDirection: "column",
    background: C.bg,
    fontFamily: "'Tajawal', 'Noto Sans Arabic', sans-serif",
    direction: "rtl",
    maxWidth: 480,
    margin: "0 auto",
    position: "relative",
    overflow: "hidden"
  }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        ::-webkit-scrollbar{width:0;}
        button:active{transform:scale(.96);opacity:.85;}
        p,span,div{font-family:inherit;}
        input,textarea,select{font-family:inherit;}
        select option{background:${C.card};}
        input[type=time],input[type=date]{color-scheme:${dark ? "dark" : "light"};}
      `}</style>

      {/* Screens */}
      <div style={{
      flex: 1,
      overflow: "hidden"
    }}>
        {navTab === "home" && <HomeScreen tasks={tasks} setTasks={setTasks} onNavigate={setNavTab} C={C} dark={dark} />}
        {navTab === "tasks" && <TasksScreen tasks={tasks} setTasks={setTasks} C={C} dark={dark} />}
        {navTab === "journal" && <JournalScreen entries={entries} setEntries={setEntries} C={C} dark={dark} />}
        {navTab === "profile" && <ProfileScreen tasks={tasks} entries={entries} dark={dark} setDark={handleDark} onLogout={handleLogout} C={C} />}
      </div>

      {/* Bottom Nav */}
      <div style={{
      display: "flex",
      background: C.navBg,
      backdropFilter: "blur(20px)",
      borderTop: `1.5px solid ${C.border}`,
      padding: "8px 0 12px",
      boxShadow: "0 -4px 24px rgba(0,0,0,.08)",
      flexShrink: 0
    }}>
        {NAV.map(n => {
        const active = navTab === n.id;
        const col = NAV_COLORS[n.id];
        return <button key={n.id} onClick={() => setNavTab(n.id)} style={{
          flex: 1,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          gap: 4,
          border: "none",
          background: "none",
          cursor: "pointer",
          color: active ? col : C.textDim,
          fontSize: 10,
          fontFamily: "inherit",
          fontWeight: active ? 800 : 500,
          padding: "4px 0",
          transition: "all .2s"
        }}>
              <div style={{
            width: 44,
            height: 30,
            borderRadius: 12,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: active ? col + "18" : "transparent",
            transition: "all .25s"
          }}>
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke={active ? col : C.textDim} strokeWidth={active ? 2.2 : 1.6} strokeLinecap="round" strokeLinejoin="round"><path d={n.icon} /></svg>
              </div>
              {n.label}
            </button>;
      })}
      </div>
    </div>;
}


// Mount
document.getElementById('loading').style.display='none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

</script>
</body>
</html>
